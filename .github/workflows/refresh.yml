name: Weekly data refresh

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout scraper repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: lavicitor/island-guide-data
          path: island-guide-data
          token: ${{ secrets.DATA_REPO_TOKEN }}

      - name: Scrape islands
        run: |
          while IFS= read -r ISLAND || [[ -n "$ISLAND" ]]; do
            [[ -z "$ISLAND" || "$ISLAND" == \#* ]] && continue
            echo "Scraping: $ISLAND"
            python island_guide.py \
              --island "$ISLAND" \
              --output-dir island-guide-data/data \
              --refresh || echo "Warning: scrape failed for $ISLAND"
          done < island-guide-data/islands.txt

      - name: Generate pages
        run: |
          while IFS= read -r ISLAND || [[ -n "$ISLAND" ]]; do
            [[ -z "$ISLAND" || "$ISLAND" == \#* ]] && continue
            echo "Generating page: $ISLAND"
            (cd island-guide-data && python generate_pages.py --island "$ISLAND") \
              || echo "Warning: page generation failed for $ISLAND"
          done < island-guide-data/islands.txt

      - name: Commit and push
        run: |
          cd island-guide-data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ islands/ index.html index_cache/
          git diff --staged --quiet || git commit -m "chore: weekly data refresh $(date -u +%Y-%m-%d)"
          git push
